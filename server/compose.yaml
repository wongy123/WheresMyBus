services:
  redis:
    image: redis:7-alpine
    container_name: wheresmybus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: .
    container_name: wheresmybus-api
    restart: unless-stopped
    env_file: .env
    environment:
      - REDIS_URL=redis://redis:6379
      - TZ=Australia/Brisbane
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      - redis
