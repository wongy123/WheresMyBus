services:
  redis:
    image: redis:7-alpine
    container_name: wheresmybus-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  api:
    build: ./server
    container_name: wheresmybus-api
    restart: unless-stopped
    env_file: ./server/.env
    environment:
      - REDIS_URL=redis://redis:6379
      - TZ=Australia/Brisbane
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    depends_on:
      - redis

  client:
    build: ./client
    container_name: wheresmybus-client
    restart: unless-stopped
    env_file: ./client/.env
    environment:
      - TZ=Australia/Brisbane
    ports:
      - "5000:5000"
    depends_on:
      - api
