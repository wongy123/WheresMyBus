<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Bus body -->
  <rect x="2" y="6" width="28" height="18" rx="3" fill="#0d6efd"/>
  <!-- Front/rear bumpers -->
  <rect x="4" y="6" width="24" height="2" rx="1" fill="#084298"/>
  <!-- Side windows row -->
  <rect x="4" y="9" width="10" height="6" rx="1.5" fill="#cfe2ff"/>
  <rect x="18" y="9" width="10" height="6" rx="1.5" fill="#cfe2ff"/>
  <!-- Door -->
  <rect x="13" y="15" width="6" height="9" rx="1" fill="#084298"/>
  <!-- Wheels -->
  <circle cx="8" cy="26" r="4" fill="#212529"/>
  <circle cx="24" cy="26" r="4" fill="#212529"/>
  <circle cx="8" cy="26" r="1.8" fill="#adb5bd"/>
  <circle cx="24" cy="26" r="1.8" fill="#adb5bd"/>
  <!-- Destination board -->
  <rect x="4" y="6" width="24" height="3" rx="1.5" fill="#fff" opacity="0.15"/>
