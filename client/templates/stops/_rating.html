{% set avg = rating.get('avg_rating') %}
{% set count = rating.get('ratings_count', 0) %}
<div id="stop-rating">
  {% if avg %}
    <span class="badge text-bg-primary">
      {{ '%.2f'|format(avg|float) }} ★
    </span>
    <span class="text-muted small ms-2">
      {{ count }} {{ 'rating' if count == 1 else 'ratings' }}
    </span>
  {% else %}
    <span class="text-muted small">No ratings yet.</span>
  {% endif %}
</div>
