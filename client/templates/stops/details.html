{% extends "base.html" %}
{% block content %}
<h1 class="h4 mb-1">{{ stop.stop_name }}</h1>
<div class="text-muted small mb-3">
  Stop ID: <code>{{ stop.stop_id }}</code>
  {% if stop.stop_code %} • Code: <code>{{ stop.stop_code }}</code>{% endif %}
  {% if stop.zone_id %} • Zone: {{ stop.zone_id }}{% endif %}
</div>

<div class="my-2">
  <a class="btn btn-primary" href="{{ BASE_PATH }}/timetable/stop/{{ stop.stop_id }}">
    View Timetable
  </a>
</div>
{% endblock %}
