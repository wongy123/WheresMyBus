{% extends "base.html" %}
{% block content %}
<h1 class="h3 mb-4">Stops</h1>

<div class="position-relative" style="max-width:700px">
  <input
    id="stop-typeahead"
    name="q"
    type="search"
    class="form-control form-control-lg"
    placeholder="Search stop name or code..."
    autocomplete="off"
    hx-get="{{ BASE_PATH }}/hx/stops/suggest"
    hx-trigger="input changed delay:250ms, search"
    hx-target="#stop-suggest"
    hx-swap="innerHTML"
    hx-include="this"
  />
  <div id="stop-suggest" class="typeahead-list shadow-sm"></div>
</div>

<div class="mt-3 d-flex align-items-center gap-2">
  <button id="nearby-btn" class="btn btn-outline-secondary btn-sm" type="button">
    <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="bi bi-geo-alt me-1" viewBox="0 0 16 16">
      <path d="M12.166 8.94c-.524 1.062-1.234 2.12-1.96 3.07A32 32 0 0 1 8 14.58a32 32 0 0 1-2.206-2.57c-.726-.95-1.436-2.008-1.96-3.07C3.304 7.867 3 6.862 3 6a5 5 0 0 1 10 0c0 .862-.305 1.867-.834 2.94M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10"/>
      <path d="M8 8a2 2 0 1 1 0-4 2 2 0 0 1 0 4m0 1a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>
    </svg>
    Use my location
  </button>
  <span id="nearby-status" class="text-muted small"></span>
</div>

<div id="nearby-results" style="max-width:700px"></div>

<p class="mt-4 text-muted">Try "City Hall", "Garden City", or enter a stop code.</p>

<script>
document.getElementById('nearby-btn').addEventListener('click', function () {
  var status = document.getElementById('nearby-status');
  if (!navigator.geolocation) {
    status.textContent = 'Geolocation is not supported by your browser.';
    return;
  }
  status.textContent = 'Getting your location...';
  navigator.geolocation.getCurrentPosition(
    function (pos) {
      status.textContent = '';
      htmx.ajax('GET',
        '{{ BASE_PATH }}/hx/stops/nearby?lat=' + pos.coords.latitude + '&lng=' + pos.coords.longitude,
        { target: '#nearby-results', swap: 'innerHTML' }
      );
    },
    function (err) {
      status.textContent = 'Could not get your location: ' + err.message;
    }
  );
});
</script>
{% endblock %}
