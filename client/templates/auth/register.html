{% extends "base.html" %}
{% block content %}
<h1 class="h3 mb-3">Register</h1>

<div class="card p-3" style="max-width: 480px;">
  <div class="d-grid gap-2">
    <a class="btn btn-danger"
       href="{{ BASE_PATH }}/auth/cognito/start?provider=Google&next={{ next_url|urlencode }}">
      Register with Google
    </a>
    <a class="btn btn-outline-secondary"
       href="{{ BASE_PATH }}/auth/cognito/start?next={{ next_url|urlencode }}">
      Register with Email (Cognito)
    </a>
  </div>
  <p class="small text-muted mt-2 mb-0">
    Registration is handled by Cognito hosted pages (email verification & MFA included).
  </p>
</div>
{% endblock %}
