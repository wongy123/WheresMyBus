{% extends "base.html" %}
{% block content %}
<h1 class="h3 mb-3">Login</h1>

{% with messages = get_flashed_messages(with_categories=True) %}
  {% if messages %}
    {% for category, msg in messages %}
      <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>
    {% endfor %}
  {% endif %}
{% endwith %}

<form method="post" action="{{ BASE_PATH }}/login" class="card p-3" style="max-width: 480px;">
  <input type="hidden" name="next" value="{{ next_url }}">
  <div class="mb-3">
    <label for="username" class="form-label">Username</label>
    <input id="username" name="username" class="form-control" required autocomplete="username"
           value="{{ username or '' }}">
  </div>
  <div class="mb-3">
    <label for="password" class="form-label">Password</label>
    <input id="password" name="password" type="password" class="form-control" required autocomplete="current-password">
  </div>
  <div class="d-flex align-items-center gap-2">
    <button class="btn btn-primary" type="submit">Login</button>
    <a class="btn btn-link" href="{{ BASE_PATH }}/register">Create an account</a>
  </div>
</form>
{% endblock %}
