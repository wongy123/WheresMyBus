{% extends 'base.html' %}
{% block content %}
<h2 class="mb-3">Routes</h2>


<!-- Search -->
<div class="input-group mb-3">
<input id="routeQuery" type="search" class="form-control" placeholder="Search route by ID or name">
<button id="routeSearch" class="btn btn-primary">Search</button>
</div>
<div id="routeStatus" class="text-muted small mb-3"></div>


<!-- Route info -->
<div id="routeInfo" class="card d-none">
<div class="card-body">
<h5 class="card-title" id="routeLongName"></h5>
<p class="card-text mb-1"><strong>ID:</strong> <span id="routeId"></span></p>
<p class="card-text mb-1"><strong>Short name:</strong> <span id="routeShortName"></span></p>
<p class="card-text mb-1"><strong>Agency:</strong> <span id="routeAgency"></span></p>
<p class="card-text mb-1"><strong>Description:</strong> <span id="routeDesc"></span></p>
<p class="card-text mb-0"><strong>Stops served:</strong> <span id="routeStops"></span></p>
</div>
</div>
{% endblock %}
