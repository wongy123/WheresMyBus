<!-- templates/404.html -->
{% extends "base.html" %}
{% block title %}Not Found{% endblock %}
{% block content %}
<div class="text-center py-5">
  <div class="mb-3" style="font-size: 4rem; line-height: 1;">🚌</div>
  <h1 class="h2 mb-2">This stop doesn't exist</h1>
  <p class="text-muted mb-4">The page you're looking for wasn't found. It may have been removed or the URL is incorrect.</p>
  <div class="d-flex justify-content-center gap-2 flex-wrap">
    <a href="{{ BASE_PATH }}/" class="btn btn-primary">Go Home</a>
    <a href="{{ BASE_PATH }}/stops" class="btn btn-outline-secondary">Browse Stops</a>
    <a href="{{ BASE_PATH }}/routes" class="btn btn-outline-secondary">Browse Routes</a>
  </div>
</div>
{% endblock %}
