{% set me = user_info or {} %}
<div class="card">
  <div class="card-body">
    <h2 class="h6 mb-3">Profile</h2>
    {% if me and me.username %}
      <dl class="row mb-0 small">
        <dt class="col-4 col-sm-3">Username</dt>
        <dd class="col-8 col-sm-9">{{ me.username }}</dd>

        <dt class="col-4 col-sm-3">Role</dt>
        <dd class="col-8 col-sm-9">{{ me.role }}</dd>

        <dt class="col-4 col-sm-3">Created</dt>
        <dd class="col-8 col-sm-9">{{ me.created_at|to_brisbane }}</dd>
      </dl>
    {% else %}
      <div class="text-muted small">Loading…</div>
    {% endif %}
  </div>
</div>
