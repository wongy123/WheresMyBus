{% macro stop_search(dest, uid, base_path) %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<div class="row g-3 align-items-start">
  {# ── Left: search + nearby list ── #}
  <div class="col-lg-5" style="position:relative; z-index:2;">
    <div class="position-relative">
      <input
        id="{{ uid }}-typeahead"
        name="q"
        type="search"
        class="form-control form-control-lg"
        placeholder="Search stop name or code…"
        autocomplete="off"
        hx-get="{{ base_path }}/hx/stops/suggest?dest={{ dest }}"
        hx-trigger="input changed delay:250ms, search"
        hx-target="#{{ uid }}-suggest"
        hx-swap="innerHTML"
        hx-include="this"
      />
      <div id="{{ uid }}-suggest" class="typeahead-list shadow-sm" style="z-index:1000;"></div>
    </div>

    <div class="mt-3 d-flex align-items-center gap-2">
      <button id="{{ uid }}-nearby-btn" class="btn btn-outline-secondary btn-sm" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="me-1" viewBox="0 0 16 16">
          <path d="M12.166 8.94c-.524 1.062-1.234 2.12-1.96 3.07A32 32 0 0 1 8 14.58a32 32 0 0 1-2.206-2.57c-.726-.95-1.436-2.008-1.96-3.07C3.304 7.867 3 6.862 3 6a5 5 0 0 1 10 0c0 .862-.305 1.867-.834 2.94M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10"/>
          <path d="M8 8a2 2 0 1 1 0-4 2 2 0 0 1 0 4m0 1a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>
        </svg>
        Use my location
      </button>
      <span id="{{ uid }}-nearby-status" class="text-muted small"></span>
    </div>

    <div id="{{ uid }}-nearby-results"></div>

    <p class="mt-3 text-muted small">Try "City Hall", "Garden City", or enter a stop code.</p>
  </div>

  {# ── Right: map ── #}
  <div class="col-lg-7" style="position:relative; z-index:1;">
    <div id="{{ uid }}-map" style="height: 350px; border-radius: 8px; border: 1px solid #dee2e6;"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function () {
  var basePath = {{ base_path | tojson }};
  var dest     = {{ dest | tojson }};
  var hrefBase = dest === 'timetable' ? basePath + '/timetable/stop' : basePath + '/stops';

  var map = L.map({{ (uid ~ '-map') | tojson }}).setView([-27.47, 153.02], 12);
  window[{{ (uid ~ '_leafletMap') | tojson }}] = map;
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(map);

  function makeIcon(s) {
    var rt = s.primary_route_type;
    var isStation = s.location_type === 1;
    var color, label;
    if      (rt === 2 || rt === 1 || rt === 12) { color = '#6f42c1'; label = 'T'; }
    else if (rt === 0)                           { color = '#e6a817'; label = 'L'; }
    else if (rt === 4)                           { color = '#0dcaf0'; label = 'F'; }
    else                                         { color = '#0d6efd'; label = 'B'; }
    var size = isStation ? 22 : 18, radius = isStation ? '4px' : '50%';
    return L.divIcon({
      className: '',
      html: '<div style="width:' + size + 'px;height:' + size + 'px;background:' + color +
            ';border-radius:' + radius + ';border:2px solid white;box-shadow:0 1px 4px rgba(0,0,0,.45);' +
            'display:flex;align-items:center;justify-content:center;' +
            'color:white;font-weight:700;font-size:10px;font-family:sans-serif;">' + label + '</div>',
      iconSize: [size, size], iconAnchor: [size / 2, size / 2]
    });
  }

  var markerByStopId = {};

  window.stopSearchUpdateMap = function (stops) {
    Object.values(markerByStopId).forEach(function (m) { map.removeLayer(m); });
    markerByStopId = {};
    var valid = (stops || []).filter(function (s) { return s.stop_lat && s.stop_lon; });
    if (!valid.length) return;
    valid.forEach(function (s) {
      var popup = '<b>' + s.stop_name + '</b>' +
        '<br><a href="' + hrefBase + '/' + s.stop_id + '" ' +
        'style="display:inline-block;margin-top:4px;padding:2px 10px;font-size:.8rem;' +
        'background:#0d6efd;color:#fff;border-radius:4px;text-decoration:none;">Select</a>';
      markerByStopId[s.stop_id] = L.marker([s.stop_lat, s.stop_lon], { icon: makeIcon(s) }).addTo(map).bindPopup(popup);
    });
    if (valid.length === 1) {
      map.setView([valid[0].stop_lat, valid[0].stop_lon], 16);
    } else {
      map.fitBounds(L.latLngBounds(valid.map(function (s) { return [s.stop_lat, s.stop_lon]; })),
        { padding: [30, 30], maxZoom: 16 });
    }
  };

  window.stopSearchFocusStop = function (stopId) {
    var m = markerByStopId[stopId];
    if (!m) return;
    map.flyTo(m.getLatLng(), 16);
    m.openPopup();
  };

  // Geolocation button
  document.getElementById({{ (uid ~ '-nearby-btn') | tojson }}).addEventListener('click', function () {
    var statusEl = document.getElementById({{ (uid ~ '-nearby-status') | tojson }});
    if (!navigator.geolocation) { statusEl.textContent = 'Geolocation not supported.'; return; }
    statusEl.textContent = 'Getting location…';
    navigator.geolocation.getCurrentPosition(
      function (pos) {
        statusEl.textContent = '';
        map.setView([pos.coords.latitude, pos.coords.longitude], 15);
        htmx.ajax('GET',
          basePath + '/hx/stops/nearby?dest=' + dest + '&lat=' + pos.coords.latitude + '&lng=' + pos.coords.longitude,
          { target: '#' + {{ uid | tojson }} + '-nearby-results', swap: 'innerHTML' }
        );
      },
      function (err) { statusEl.textContent = 'Could not get location: ' + err.message; }
    );
  });
}());
</script>
{% endmacro %}
