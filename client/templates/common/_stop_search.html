{% macro stop_search(dest, uid, base_path) %}
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

<div class="row g-3 align-items-start">
  {# ── Left: search + nearby list ── #}
  <div class="col-lg-5 order-2 order-lg-1" style="position:relative; z-index:2;">
    <div class="position-relative">
      <input
        id="{{ uid }}-typeahead"
        name="q"
        type="search"
        class="form-control form-control-lg"
        placeholder="Search stop name or code…"
        autocomplete="off"
        hx-get="{{ base_path }}/hx/stops/suggest?dest={{ dest }}"
        hx-trigger="input changed delay:250ms, search"
        hx-target="#{{ uid }}-suggest"
        hx-swap="innerHTML"
        hx-include="this"
      />
      <div id="{{ uid }}-suggest" class="typeahead-list shadow-sm"></div>
    </div>

    <div class="mt-3 d-flex align-items-center gap-2">
      <button id="{{ uid }}-nearby-btn" class="btn btn-outline-secondary btn-sm" type="button">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" fill="currentColor" class="me-1" viewBox="0 0 16 16">
          <path d="M12.166 8.94c-.524 1.062-1.234 2.12-1.96 3.07A32 32 0 0 1 8 14.58a32 32 0 0 1-2.206-2.57c-.726-.95-1.436-2.008-1.96-3.07C3.304 7.867 3 6.862 3 6a5 5 0 0 1 10 0c0 .862-.305 1.867-.834 2.94M8 16s6-5.686 6-10A6 6 0 0 0 2 6c0 4.314 6 10 6 10"/>
          <path d="M8 8a2 2 0 1 1 0-4 2 2 0 0 1 0 4m0 1a3 3 0 1 0 0-6 3 3 0 0 0 0 6"/>
        </svg>
        Use my location
      </button>
      <span id="{{ uid }}-nearby-status" class="text-muted small"></span>
    </div>

    <div id="{{ uid }}-nearby-results" style="max-height: 320px; overflow-y: auto;"></div>

    <p class="mt-3 text-muted small">Try "City Hall", "Garden City", or enter a stop code.</p>
  </div>

  {# ── Right: map ── #}
  <div class="col-lg-7 order-1 order-lg-2" style="position:relative; z-index:1;">
    <div id="{{ uid }}-map" class="map-container" style="height: 350px;"></div>
  </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function () {
  var basePath = {{ base_path | tojson }};
  var dest     = {{ dest | tojson }};
  var hrefBase = dest === 'timetable' ? basePath + '/timetable/stop' : basePath + '/stops';

  var map = L.map({{ (uid ~ '-map') | tojson }}).setView([-27.47, 153.02], 12);
  var userLocationMarker = null;
  window[{{ (uid ~ '_leafletMap') | tojson }}] = map;
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 19
  }).addTo(map);

  function makeIcon(s) {
    return window.TRANSIT.makeStopIcon(s);
  }

  var searchMarkerMap = {};
  var dynamicMarkerMap = {};

  function addStopMarker(s, targetMap) {
    var popup = '<b>' + s.stop_name + '</b>' +
      '<br><a href="' + hrefBase + '/' + s.stop_id + '" class="map-popup-link">Select</a>';
    var m = L.marker([s.stop_lat, s.stop_lon], { icon: makeIcon(s) }).addTo(map).bindPopup(popup);
    targetMap[s.stop_id] = m;
  }

  window.stopSearchUpdateMap = function (stops) {
    Object.values(searchMarkerMap).forEach(function (m) { map.removeLayer(m); });
    Object.values(dynamicMarkerMap).forEach(function (m) { map.removeLayer(m); });
    searchMarkerMap = {};
    dynamicMarkerMap = {};
    var valid = (stops || []).filter(function (s) { return s.stop_lat && s.stop_lon; });
    lastSearchAt = Date.now();
    if (!valid.length) return;
    valid.forEach(function (s) { addStopMarker(s, searchMarkerMap); });
    if (valid.length === 1) {
      map.setView([valid[0].stop_lat, valid[0].stop_lon], 16);
    } else {
      map.fitBounds(L.latLngBounds(valid.map(function (s) { return [s.stop_lat, s.stop_lon]; })),
        { padding: [30, 30], maxZoom: 16 });
    }
  };

  window.stopSearchFocusStop = function (stopId) {
    var m = searchMarkerMap[stopId] || dynamicMarkerMap[stopId];
    if (!m) return;
    lastSearchAt = Date.now();
    map.flyTo(m.getLatLng(), 16);
    m.openPopup();
  };

  // Dynamic stop loading on pan/zoom
  var moveTimer = null;
  var lastSearchAt = 0;
  function loadStopsNearCenter() {
    if (Date.now() - lastSearchAt < 1000) return;
    if (map.getZoom() < 14) return;
    var center = map.getCenter();
    fetch(window.API_BASE_URL + '/stops/nearby?lat=' + center.lat + '&lng=' + center.lng + '&limit=40')
      .then(function (r) { return r.json(); })
      .then(function (data) {
        Object.values(dynamicMarkerMap).forEach(function (m) { map.removeLayer(m); });
        dynamicMarkerMap = {};
        (data.data || []).forEach(function (s) {
          if (!s.stop_lat || !s.stop_lon) return;
          if (searchMarkerMap[s.stop_id]) return;
          addStopMarker(s, dynamicMarkerMap);
        });
      })
      .catch(function () {});
  }
  map.on('moveend', function () {
    clearTimeout(moveTimer);
    moveTimer = setTimeout(loadStopsNearCenter, 400);
  });

  // Geolocation button
  document.getElementById({{ (uid ~ '-nearby-btn') | tojson }}).addEventListener('click', function () {
    var statusEl = document.getElementById({{ (uid ~ '-nearby-status') | tojson }});
    if (!navigator.geolocation) { statusEl.textContent = 'Geolocation not supported.'; return; }
    statusEl.textContent = 'Getting location…';
    navigator.geolocation.getCurrentPosition(
      function (pos) {
        statusEl.textContent = '';
        map.setView([pos.coords.latitude, pos.coords.longitude], 15);
        if (userLocationMarker) userLocationMarker.remove();
        userLocationMarker = L.marker([pos.coords.latitude, pos.coords.longitude], {
          icon: L.divIcon({
            className: '',
            html: '<span class="material-symbols-outlined" style="font-size:2rem;color:#0d6efd;text-shadow:0 1px 3px rgba(0,0,0,.4);line-height:1;">person_pin_circle</span>',
            iconSize: [32, 32], iconAnchor: [16, 32]
          })
        }).addTo(map).bindPopup('<b>Your location</b>');
        htmx.ajax('GET',
          basePath + '/hx/stops/nearby?dest=' + dest + '&lat=' + pos.coords.latitude + '&lng=' + pos.coords.longitude,
          { target: '#' + {{ uid | tojson }} + '-nearby-results', swap: 'innerHTML' }
        );
      },
      function (err) { statusEl.textContent = 'Could not get location: ' + err.message; }
    );
  });
}());
</script>
{% endmacro %}
