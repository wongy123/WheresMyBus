<!-- templates/base.html -->
<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Where's My Bus</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,1,0"
    rel="stylesheet">
  <link rel="icon" type="image/svg+xml" href="{{ url_for('static', filename='favicon.svg') }}">
  <link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
  <script>window.API_BASE_URL = {{ API_BASE_URL | tojson }};</script>
  <script src="{{ url_for('static', filename='transit.js') }}"></script>
  {% block head %}{% endblock %}
</head>

<body class="d-flex flex-column min-vh-100">
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
      <a class="navbar-brand" href="{{ BASE_PATH }}/">Where's My Bus</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="{{ BASE_PATH }}/timetable">Timetable</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ BASE_PATH }}/stops">Stops</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ BASE_PATH }}/routes">Routes</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ BASE_PATH }}/about">About</a></li>
        </ul>

      </div>
    </div>
  </nav>


  <main class="flex-grow-1 py-4">
    <div class="container">
      {% block content %}{% endblock %}
    </div>
  </main>

  <footer class="bg-light py-3 mt-auto border-top">
    <div class="container text-center small text-muted">
      Where's My Bus by Angus Wong
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.6/dist/htmx.min.js" crossorigin="anonymous"></script>
</body>

</html>
