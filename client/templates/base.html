<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Where's My Bus</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="{{ url_for('static', filename='styles.css') }}" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">
<a class="navbar-brand" href="/">Where's My Bus</a>
<button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="navbarNav">
<ul class="navbar-nav me-auto mb-2 mb-lg-0">
<li class="nav-item"><a class="nav-link" href="/timetable">Timetable</a></li>
<li class="nav-item"><a class="nav-link" href="/stops">Stops</a></li>
<li class="nav-item"><a class="nav-link" href="/routes">Routes</a></li>
</ul>
<div class="d-flex gap-2">
<!-- Simple Login/Logout placeholders -->
<button id="btnLogin" class="btn btn-outline-light btn-sm">Login</button>
<button id="btnLogout" class="btn btn-outline-warning btn-sm d-none">Logout</button>
</div>
</div>
</div>
</nav>


<!-- Page content -->
<main class="flex-grow-1 py-4">
<div class="container">
{% block content %}{% endblock %}
</div>
</main>


<!-- Footer -->
<footer class="bg-light py-3 mt-auto border-top">
<div class="container text-center small text-muted">
Where's My Bus by Angus Wong 2025
</div>
</footer>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
// Expose API base to client JS
window.API_BASE_URL = '{{ API_BASE_URL }}';
</script>
<script src="{{ url_for('static', filename='main.js') }}"></script>
</body>
</html>
